<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NyaySetu — Understand your law. Make the right move.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F8F3EA;
    --cream-glass: rgba(250, 246, 238, 0.55);
    --cream-glass-hover: rgba(250, 246, 238, 0.68);
    --charcoal:#2B2620;
    --charcoal-soft:#5A5348;
    --burgundy:#8C3D46;
    --burgundy-deep:#75323A;
    --beige:#EDE3D2;
    --beige-line: rgba(43, 38, 32, 0.12);
    --shadow: rgba(43, 38, 32, 0.16);
    
  }

  *{ box-sizing:border-box; }
  html, body{ margin:0; height:100%; }

  body{
    font-family:'Inter', sans-serif;
    color:var(--charcoal);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  .display{
    font-family:'Instrument Sans', 'Inter', sans-serif;
  }

  a{ color:inherit; }
  button{ font-family:inherit; }

  /* ================= HERO / VIDEO STAGE ================= */
  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    background:var(--cream);
  }

  .video-stage{
    position:absolute;
    inset:0;
    z-index:0;
    overflow:hidden;
  }

  .video-stage video{
    position:absolute;
    top:50%;
    left:50%;
    min-width:100%;
    min-height:100%;
    width:auto;
    height:auto;
    transform:translate(-50%, -50%) scale(1.1);
    object-fit:cover;
    /* grayscale + crop are baked into the file itself; just soften it here */
    filter:brightness(1.12) contrast(0.92) blur(10px);
  }

  .video-overlay{
    position:absolute;
    inset:0;
    background:
      radial-gradient(120% 90% at 50% 20%, rgba(248,243,234,0.32) 0%, rgba(248,243,234,0.58) 55%, rgba(248,243,234,0.78) 100%),
      linear-gradient(rgba(248,243,234,0.4), rgba(248,243,234,0.4));
    z-index:1;
  }

  /* subtle glass sheen sweep to sell the "glazed screen" feel */
  .video-overlay::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.16) 48%, transparent 66%);
    background-size:220% 220%;
    animation: sheen 14s ease-in-out infinite;
  }

  /* create isolated stacking context for hero children */
  .hero-content { isolation: isolate; }

  @keyframes sheen{
    0%{ background-position:120% 0%; }
    50%{ background-position:-20% 100%; }
    100%{ background-position:120% 0%; }
  }

  

  /* ================= HERO CONTENT ================= */
  .hero-content{
    position:relative;
    z-index:2;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 24px 64px;
    transition:padding-left .32s cubic-bezier(.2,.8,.2,1);
  }

  @media (min-width:901px){
    .hero-content{ padding-left:24px; }
  }

  .eyebrow-tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--cream-glass);
    border:1px solid var(--beige-line);
    padding:7px 16px;
    border-radius:999px;
    font-size:0.82rem;
    font-weight:500;
    color:var(--charcoal-soft);
    margin-bottom:28px;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    animation: fadeUp 0.7s ease both;
    animation-delay:0.05s;
  }
  .eyebrow-tag .spark{ color:var(--burgundy); }

  h1.headline{
    font-family:'Instrument Sans', sans-serif;
    font-weight:600;
    font-size:clamp(2.4rem, 5.4vw, 4.6rem);
    line-height:1.08;
    letter-spacing:-0.02em;
    color:var(--charcoal);
    margin:0 0 22px;
    max-width:15ch;
    animation: fadeUp 0.75s ease both;
    animation-delay:0.12s;
  }

  .subtitle{
    font-size:clamp(1rem, 1.3vw, 1.2rem);
    line-height:1.6;
    color:var(--charcoal-soft);
    max-width:520px;
    margin:0 0 44px;
    animation: fadeUp 0.75s ease both;
    animation-delay:0.2s;
  }

  /* ================= UPLOAD CARD ================= */
  .upload-card{
    width:100%;
    max-width:520px;
    background:var(--cream-glass);
    border:1px solid var(--beige-line);
    border-radius:26px;
    padding:44px 40px;
    backdrop-filter:blur(14px) saturate(1.1);
    -webkit-backdrop-filter:blur(14px) saturate(1.1);
    box-shadow:0 20px 50px -24px var(--shadow), 0 2px 8px rgba(43,38,32,0.05);
    cursor:pointer;
    transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease, backdrop-filter .35s ease, background .35s ease;
    animation: fadeUp 0.8s ease both, floaty 6.5s ease-in-out infinite;
    animation-delay:0.3s, 1.1s;
    position: relative;
    z-index: 30;
  }
  .upload-card:hover{
    transform:translateY(-6px);
    background:var(--cream-glass-hover);
    box-shadow:0 30px 64px -22px var(--shadow), 0 4px 14px rgba(43,38,32,0.08);
    backdrop-filter:blur(18px) saturate(1.15);
    -webkit-backdrop-filter:blur(18px) saturate(1.15);
  }

  .upload-icon-wrap{
    width:56px;
    height:56px;
    margin:0 auto 20px;
    border-radius:16px;
    background:var(--beige);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .upload-card:hover .upload-icon-wrap{
    transform:translateY(-2px) rotate(-4deg);
  }
  .upload-icon-wrap svg{ width:24px; height:24px; }

  .upload-card h2{
    font-family:'Instrument Sans', sans-serif;
    font-size:1.28rem;
    font-weight:600;
    margin:0 0 6px;
    color:var(--charcoal);
  }

  .upload-card .drag-text{
    font-size:0.95rem;
    color:var(--charcoal-soft);
    margin:0 0 22px;
  }
  .drag-text .browse{
    color:var(--burgundy);
    font-weight:600;
    text-decoration:none;
    border-bottom:1px solid transparent;
    transition:border-color .2s ease;
  }
  .drag-text .browse:hover{ border-color:var(--burgundy); }

  .supports{
    font-size:0.82rem;
    color:var(--charcoal-soft);
    opacity:0.75;
    letter-spacing:0.01em;
  }

  /* ================= ANIMATIONS ================= */
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(16px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateX(-8px); }
    to{ opacity:1; transform:translateX(0); }
  }
  @keyframes floaty{
    0%, 100%{ transform:translateY(0); }
    50%{ transform:translateY(-7px); }
  }

  @media (prefers-reduced-motion: reduce){
    .upload-card, .eyebrow-tag, h1.headline, .subtitle{
      animation:none !important;
    }
    .video-overlay::after{ animation:none !important; }
  }

  /* ================= MOBILE MENU (hamburger + dropdown) ================= */
  .mobile-toggle{
    display:none;
    position:fixed;
    top:16px;
    left:16px;
    z-index:20;
    width:46px;
    height:46px;
    border-radius:14px;
    background:var(--cream-glass);
    border:1px solid var(--beige-line);
    backdrop-filter:blur(14px) saturate(1.1);
    -webkit-backdrop-filter:blur(14px) saturate(1.1);
    box-shadow:0 12px 32px -18px var(--shadow), 0 1px 3px rgba(43,38,32,0.05);
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:var(--charcoal);
  }
  .mobile-toggle svg{ width:20px; height:20px; }
  .mobile-toggle .icon-close{ display:none; }
  .mobile-toggle.is-open .icon-menu{ display:none; }
  .mobile-toggle.is-open .icon-close{ display:block; }

  .mobile-menu{
    display:none;
    position:fixed;
    top:70px;
    left:16px;
    right:16px;
    z-index:19;
    background:var(--cream-glass);
    border:1px solid var(--beige-line);
    border-radius:22px;
    padding:12px;
    backdrop-filter:blur(14px) saturate(1.1);
    -webkit-backdrop-filter:blur(14px) saturate(1.1);
    box-shadow:0 20px 50px -24px var(--shadow), 0 2px 8px rgba(43,38,32,0.05);
    flex-direction:column;
    gap:2px;
    opacity:0;
    transform:translateY(-10px) scale(0.98);
    pointer-events:none;
    transition:opacity .22s ease, transform .28s cubic-bezier(.2,.8,.2,1);
  }
  .mobile-menu .rail-link{ color:var(--charcoal-soft); }
  .mobile-menu .rail-link .label{ opacity:1 !important; max-width:none !important; }
  .mobile-menu.is-open{
    opacity:1;
    transform:translateY(0) scale(1);
    pointer-events:auto;
  }

  /* ================= RESPONSIVE ================= */
  @media (max-width: 900px){
    .mobile-toggle{ display:none; }
    .mobile-menu{ display:none; }
    .hero-content{ padding:100px 18px 48px; }
  }

  @media (max-width: 600px){
    .hero-content{ padding:96px 14px 40px; }
    .upload-card{ padding:32px 24px; border-radius:22px; }
    h1.headline{ max-width:100%; }
  }
</style>
</head>
<body>

<section class="hero">

  <div class="video-stage">
    <video autoplay muted loop playsinline poster="assets/hero-poster.jpg">
      <source src="assets/hero-bg.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
  </div>

  

  <div class="hero-content">
    <div class="eyebrow-tag"><span class="spark">✦</span> Your AI legal companion</div>

    <h1 class="headline">Understand your law.<br>Make the right move.</h1>

    <p class="subtitle">Legal documents don't have to be confusing. Upload yours and we'll explain them in plain language.</p>

    <div class="upload-card">
      <div class="upload-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="#8C3D46" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M14 2V8H20" stroke="#8C3D46" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Drop your document here</h2>
      <p class="drag-text">or <a href="#" class="browse">browse your files</a></p>
      <div class="supports">Supports PDF · DOCX · Images</div>
    </div>
  </div>

</section>

 

</body>
</html>
